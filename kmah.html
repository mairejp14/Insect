<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Hex Симуляція: Повна Машина Часу</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f0f0; font-family: sans-serif; }
        canvas { display: block; background: #fff; }
        .ui-panel {
            position: absolute; top: 0; left: 0; bottom: 0;
            width: 160px; background: rgba(255, 255, 255, 0.95);
            border-right: 1px solid #ccc; padding: 15px;
            display: flex; flex-direction: column; gap: 8px;
            z-index: 10;
        }
        .time-panel {
            position: absolute; bottom: 20px; left: 180px;
            background: rgba(255, 255, 255, 0.9); padding: 10px;
            border-radius: 8px; border: 1px solid #ccc;
            display: flex; gap: 5px; z-index: 10;
        }
        .stats-panel {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0, 0, 0, 0.7); color: #fff;
            padding: 10px; border-radius: 8px; font-size: 14px;
            pointer-events: none; z-index: 10;
        }
        button { padding: 6px; cursor: pointer; border: 1px solid #999; background: #eee; border-radius: 4px; font-size: 11px; }
        button.active { background: #ffcc00; font-weight: bold; border-color: #333; }
        .btn-danger { background: #ffaaaa; margin-top: auto; }
        hr { border: 0; border-top: 1px solid #ccc; width: 100%; }
    </style>
</head>
<body>

<div class="stats-panel">
    <div>Живі: <span id="count-live">0</span> | Народилися: <span id="count-born">0</span> | Померли: <span id="count-died">0</span></div>
</div>

<div class="ui-panel">
    <b>Керування:</b>
    <button id="mode-move" class="active">Рух / Зум</button>
    <button id="mode-edit">Редагувати</button>
    <button id="mode-delete">Видалити</button>
    <hr>
    <b>Об'єкт:</b>
    <button id="spawn-wall" class="active">Стіна</button>
    <button id="spawn-bug">Комаха</button>
    <button id="clear-all" class="btn-danger">Очистити все</button>
</div>

<div class="time-panel" id="time-controls">
    <button data-speed="0">PAUSE</button>
    <button data-speed="1" class="active">1X</button>
    <button data-speed="2">2X</button>
    <button data-speed="5">5X</button>
    <button data-speed="10">10X</button>
    <button data-speed="20">20X</button>
    <button data-speed="50">50X</button>
    <button data-speed="100">100X</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height, scale = 1.0, offset = { x: 400, y: 300 };
    let isDragging = false, lastMousePos = { x: 0, y: 0 };
    let currentMode = 'move', selectedObject = 'wall';
    
    // СТАТИСТИКА ТА ЧАС
    let totalBorn = 0, totalDied = 0;
    let timeSpeed = 1;
    let gameTime = 0; // Внутрішній ігровий годинник

    let walls = new Set(); 
    let trails = new Map(); 
    let arrows = []; 
    let bugs = [];

    const dirs = [[1, 0], [0, 1], [-1, 1], [-1, 0], [0, -1], [1, -1]];
    const bugColors = { 1: "#FF8C00", 2: "#8B0000", 3: "#006400", 4: "#00008B", 5: "#008B8B", 6: "#B8860B", 7: "#4B0082" };

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    function createBug(q, r) {
        totalBorn++;
        return {
            q, r, dirIdx: Math.floor(Math.random() * 6),
            birthTime: gameTime, // Народжується в ігровому часі
            spawn1: false, spawn2: false,
            spawn1Delay: (2 + Math.random() * 3) * 1000,
            spawn2Delay: (9 + Math.random() * 3) * 1000,
            deathDelay: (13 + Math.random() * 4) * 1000
        };
    }

    function updateBugs() {
        if (timeSpeed === 0) return;

        // Виконуємо стільки кроків, яка швидкість часу
        for (let step = 0; step < timeSpeed; step++) {
            gameTime += 100; // Додаємо 100мс ігрового часу за кожен крок
            const nextBugs = [];
            const bugGroups = new Map();

            for (let bug of bugs) {
                let age = gameTime - bug.birthTime;

                // Перевірка смерті
                if (age > bug.deathDelay) { 
                    totalDied++; 
                    continue; 
                }

                // Розмноження
                if (!bug.spawn1 && age > bug.spawn1Delay) {
                    nextBugs.push(createBug(bug.q, bug.r));
                    bug.spawn1 = true;
                }
                if (!bug.spawn2 && age > bug.spawn2Delay) {
                    nextBugs.push(createBug(bug.q, bug.r));
                    bug.spawn2 = true;
                }

                // Взаємодія зі стрілками
                let arrowIndices = arrows.filter(a => a.q === bug.q && a.r === bug.r);
                if (arrowIndices.length > 0) {
                    let rand = Math.random();
                    if (rand < 0.33) {
                        bug.dirIdx = arrowIndices[Math.floor(Math.random() * arrowIndices.length)].dirIdx;
                    } else if (rand < 0.66) {
                        let idx = arrows.findIndex(a => a.q === bug.q && a.r === bug.r);
                        if (idx !== -1) arrows.splice(idx, 1);
                    }
                }

                // Рух (7 варіантів)
                let choice = Math.floor(Math.random() * 7);
                if (choice < 6) {
                    bug.dirIdx = choice;
                    let move = dirs[bug.dirIdx];
                    let nQ = bug.q + move[0], nR = bug.r + move[1];
                    if (walls.has(`${nQ},${nR}`)) {
                        if (Math.random() < 0.5) trails.set(`${bug.q},${bug.r}`, "orange");
                    } else {
                        arrows.push({ q: bug.q, r: bug.r, dirIdx: bug.dirIdx });
                        bug.q = nQ; bug.r = nR;
                    }
                }
                nextBugs.push(bug);
                let posKey = `${bug.q},${bug.r}`;
                bugGroups.set(posKey, (bugGroups.get(posKey) || 0) + 1);
            }
            bugs = nextBugs;
            bugs.forEach(b => b.count = bugGroups.get(`${b.q},${b.r}`));
        }

        document.getElementById('count-live').innerText = bugs.length;
        document.getElementById('count-born').innerText = totalBorn;
        document.getElementById('count-died').innerText = totalDied;
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        const size = 30 * scale;
        const hexWidth = Math.sqrt(3) * size;

        const startCol = Math.floor((-offset.x - hexWidth) / hexWidth);
        const endCol = Math.ceil((width - offset.x + hexWidth) / hexWidth);
        const startRow = Math.floor((-offset.y - size) / (size * 1.5));
        const endRow = Math.ceil((height - offset.y + size) / (size * 1.5));

        // Сітка
        for (let r = startRow; r <= endRow; r++) {
            for (let q = startCol - 1; q <= endCol; q++) {
                let key = `${q},${r}`;
                const x = offset.x + q * hexWidth + (r % 2 !== 0 ? hexWidth / 2 : 0);
                const y = offset.y + r * size * 1.5;
                
                if (walls.has(key)) drawHex(x, y, size, "#888", true);
                else if (trails.has(key)) drawHex(x, y, size, trails.get(key), true);
                else drawHexOutline(x, y, size, "#e0e0e0");
            }
        }

        // Стрілки
        arrows.forEach(a => {
            const x = offset.x + a.q * hexWidth + (a.r % 2 !== 0 ? hexWidth / 2 : 0);
            const y = offset.y + a.r * size * 1.5;
            if (x > -50 && x < width + 50 && y > -50 && y < height + 50) drawArrow(x, y, a.dirIdx, size);
        });

        // Комахи
        bugs.forEach(bug => {
            const x = offset.x + bug.q * hexWidth + (bug.r % 2 !== 0 ? hexWidth / 2 : 0);
            const y = offset.y + bug.r * size * 1.5;
            ctx.fillStyle = bugColors[bug.count] || "#4B0082";
            ctx.strokeStyle = "black";
            ctx.lineWidth = 1.5 * scale;
            ctx.beginPath();
            ctx.arc(x, y, size * 0.3, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
        });
        requestAnimationFrame(draw);
    }

    function drawHex(x, y, size, color, fill) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i - (Math.PI / 6);
            ctx.lineTo(x + size * Math.cos(angle), y + size * Math.sin(angle));
        }
        ctx.closePath();
        ctx.fillStyle = color; ctx.fill();
    }

    function drawHexOutline(x, y, size, color) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i - (Math.PI / 6);
            ctx.lineTo(x + size * Math.cos(angle), y + size * Math.sin(angle));
        }
        ctx.closePath();
        ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.stroke();
    }

    function drawArrow(x, y, dirIdx, size) {
        const angles = [0, Math.PI/3, 2*Math.PI/3, Math.PI, 4*Math.PI/3, 5*Math.PI/3];
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angles[dirIdx]);
        ctx.strokeStyle = "rgba(0, 0, 255, 0.3)";
        ctx.lineWidth = 1.5 * scale;
        ctx.beginPath();
        ctx.moveTo(-size * 0.2, 0); ctx.lineTo(size * 0.4, 0);
        ctx.lineTo(size * 0.2, -size * 0.1);
        ctx.moveTo(size * 0.4, 0); ctx.lineTo(size * 0.2, size * 0.1);
        ctx.stroke();
        ctx.restore();
    }

    function pixelToHex(px, py) {
        const size = 30 * scale;
        const x = px - offset.x, y = py - offset.y;
        const r = Math.round(y / (size * 1.5));
        const q = Math.round((x - (r % 2 !== 0 ? (Math.sqrt(3) * size) / 2 : 0)) / (Math.sqrt(3) * size));
        return { q, r };
    }

    // Керування
    document.getElementById('time-controls').onclick = (e) => {
        if (e.target.tagName === 'BUTTON') {
            timeSpeed = parseInt(e.target.dataset.speed);
            document.querySelectorAll('#time-controls button').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
        }
    };

    document.getElementById('clear-all').onclick = () => { 
        walls.clear(); trails.clear(); arrows = []; bugs = []; totalBorn = 0; totalDied = 0; gameTime = 0;
    };

    canvas.addEventListener('mousedown', (e) => {
        const { q, r } = pixelToHex(e.clientX, e.clientY);
        if (currentMode === 'edit') {
            if (selectedObject === 'wall') walls.add(`${q},${r}`);
            else bugs.push(createBug(q, r));
        } else if (currentMode === 'delete') {
            walls.delete(`${q},${r}`); trails.delete(`${q},${r}`);
            bugs = bugs.filter(b => b.q !== q || b.r !== r);
            arrows = arrows.filter(a => a.q !== q || a.r !== r);
        } else { isDragging = true; lastMousePos = { x: e.clientX, y: e.clientY }; }
    });

    window.addEventListener('mousemove', (e) => {
        if (isDragging && currentMode === 'move') {
            offset.x += e.clientX - lastMousePos.x;
            offset.y += e.clientY - lastMousePos.y;
            lastMousePos = { x: e.clientX, y: e.clientY };
        }
    });
    window.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoom = Math.exp(e.deltaY > 0 ? -0.1 : 0.1);
        offset.x = e.clientX - (e.clientX - offset.x) * zoom;
        offset.y = e.clientY - (e.clientY - offset.y) * zoom;
        scale *= zoom;
    }, { passive: false });

    document.getElementById('mode-move').onclick = (e) => { currentMode = 'move'; updateActive(e.target); };
    document.getElementById('mode-edit').onclick = (e) => { currentMode = 'edit'; updateActive(e.target); };
    document.getElementById('mode-delete').onclick = (e) => { currentMode = 'delete'; updateActive(e.target); };
    document.getElementById('spawn-wall').onclick = (e) => { selectedObject = 'wall'; updateActive(e.target); };
    document.getElementById('spawn-bug').onclick = (e) => { selectedObject = 'bug'; updateActive(e.target); };
    function updateActive(el) { el.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active')); el.classList.add('active'); }

    setInterval(updateBugs, 100);
    window.addEventListener('resize', resize);
    resize(); draw();
</script>

</body>
</html>
