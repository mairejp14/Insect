<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Hex Simulation: More Gaps</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: sans-serif; }
        canvas { display: block; }
        
        .ui-panel {
            position: absolute; top: 0; left: 0; bottom: 0;
            width: 170px; background: transparent;
            padding: 15px; display: flex; flex-direction: column; gap: 8px;
            z-index: 10; pointer-events: none;
        }
        
        .ui-panel b, .ui-panel button, .ui-panel select, .ui-panel hr {
            pointer-events: auto;
        }

        .stats-panel {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0, 0, 0, 0.7); color: #fff;
            padding: 10px; border-radius: 8px; font-size: 14px;
            z-index: 10;
        }

        .time-panel {
            position: absolute; bottom: 20px; left: 190px;
            background: rgba(255, 255, 255, 0.8); padding: 8px;
            border-radius: 8px; border: 1px solid #ccc;
            display: flex; gap: 5px; z-index: 10;
        }

        button, select { padding: 6px; cursor: pointer; border: 1px solid #999; background: #eee; border-radius: 4px; font-size: 11px; }
        button.active { background: #ffcc00; font-weight: bold; border-color: #333; }
        .btn-danger { background: #ffaaaa; margin-top: auto; }
        hr { border: 0; border-top: 1px solid #ccc; width: 100%; }
        b { color: #333; text-shadow: 1px 1px 0 #fff; }
    </style>
</head>
<body>

<div class="stats-panel">
    <div>Живі: <span id="count-live">0</span> | Народилися: <span id="count-born">0</span> | Померли: <span id="count-died">0</span></div>
</div>

<div class="ui-panel">
    <b>СВІТ:</b>
    <select id="world-type">
        <option value="empty">Пустий світ</option>
        <option value="hex-grid">Сітка шестикутників</option>
    </select>
    <button id="generate-world">Згенерувати</button>
    <hr>
    <b>КЕРУВАННЯ:</b>
    <button id="mode-move" class="active">Рух / Зум</button>
    <button id="mode-edit">Редагувати</button>
    <button id="mode-delete">Видалити</button>
    <hr>
    <b>ОБ'ЄКТ:</b>
    <button id="spawn-wall" class="active">Стіна</button>
    <button id="spawn-bug">Комаха</button>
    <button id="clear-all" class="btn-danger">Очистити все</button>
</div>

<div class="time-panel" id="time-controls">
    <button data-speed="0">PAUSE</button>
    <button data-speed="1" class="active">1X</button>
    <button data-speed="5">5X</button>
    <button data-speed="20">20X</button>
    <button data-speed="100">100X</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height, scale = 1.0, offset = { x: 400, y: 300 };
    let isDragging = false, lastMousePos = { x: 0, y: 0 };
    let currentMode = 'move', selectedObject = 'wall';
    
    let totalBorn = 0, totalDied = 0, gameTime = 0, timeSpeed = 1;

    let walls = new Set(); 
    let trails = new Map(); 
    let arrows = []; 
    let bugs = [];

    const dirs = [[1, 0], [0, 1], [-1, 1], [-1, 0], [0, -1], [1, -1]];
    const bugColors = { 1: "#FF8C00", 2: "#8B0000", 3: "#006400", 4: "#00008B" };

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    function generateWorld() {
        const type = document.getElementById('world-type').value;
        walls.clear(); trails.clear(); bugs = []; arrows = [];
        totalBorn = 0; totalDied = 0;

        if (type === 'hex-grid') {
            const hexSize = 8; 
            // Збільшили шанс зникнення до 0.5 (50%)
            const gapChance = 0.5; 

            for (let qOff = -8; qOff <= 8; qOff++) {
                for (let rOff = -8; rOff <= 8; rOff++) {
                    let qc = (qOff * 2 + rOff) * hexSize;
                    let rc = (rOff - qOff) * hexSize;
                    if (Math.abs(qc) > 60 || Math.abs(rc) > 60) continue;
                    for (let d = 0; d < 6; d++) {
                        // Якщо випало число менше за gapChance, ця стіна не малюється
                        if (Math.random() < gapChance) continue;
                        let d1 = dirs[d], d2 = dirs[(d + 1) % 6];
                        for (let i = 0; i < hexSize; i++) {
                            let q = qc + d1[0] * hexSize + (d2[0] - d1[0]) * i;
                            let r = rc + d1[1] * hexSize + (d2[1] - d1[1]) * i;
                            walls.add(`${q},${r}`);
                        }
                    }
                }
            }
        }
    }

    // Решта коду без змін
    function createBug(q, r) {
        totalBorn++;
        return {
            q, r, dirIdx: Math.floor(Math.random() * 6),
            birthTime: gameTime,
            spawn1: false,
            spawn1Delay: (3 + Math.random() * 4) * 1000,
            deathDelay: (15 + Math.random() * 5) * 1000
        };
    }

    function updateBugs() {
        if (timeSpeed === 0) return;
        for (let step = 0; step < timeSpeed; step++) {
            gameTime += 100;
            const nextBugs = [];
            const bugGroups = new Map();

            for (let i = 0; i < bugs.length; i++) {
                let bug = bugs[i];
                let posKey = `${bug.q},${bug.r}`;

                let besideWall = dirs.some(d => walls.has(`${bug.q + d[0]},${bug.r + d[1]}`));
                if (besideWall) {
                    totalDied++;
                    if (trails.get(posKey) === "yellow") trails.set(posKey, "purple");
                    else trails.set(posKey, "yellow");
                    continue; 
                }

                if (dirs.some(d => trails.get(`${bug.q + d[0]},${bug.r + d[1]}`) === "purple")) {
                    trails.set(posKey, "red");
                }

                if (trails.get(posKey) === "red") {
                    bug.dirIdx = (bug.dirIdx + 3) % 6;
                    let move = dirs[bug.dirIdx];
                    bug.q += move[0]; bug.r += move[1];
                } else {
                    let choice = Math.floor(Math.random() * 7);
                    if (choice < 6) {
                        arrows.push({ q: bug.q, r: bug.r, dirIdx: choice });
                        bug.dirIdx = choice;
                        let move = dirs[bug.dirIdx];
                        let nQ = bug.q + move[0], nR = bug.r + move[1];
                        if (!walls.has(`${nQ},${nR}`)) { bug.q = nQ; bug.r = nR; }
                    }
                }

                if (gameTime - bug.birthTime > bug.deathDelay) { totalDied++; continue; }
                if (!bug.spawn1 && gameTime - bug.birthTime > bug.spawn1Delay) { nextBugs.push(createBug(bug.q, bug.r)); bug.spawn1 = true; }
                
                nextBugs.push(bug);
                bugGroups.set(`${bug.q},${bug.r}`, (bugGroups.get(`${bug.q},${bug.r}`) || 0) + 1);
            }
            bugs = nextBugs;
            if (arrows.length > 800) arrows.shift();
            bugs.forEach(b => b.count = bugGroups.get(`${b.q},${b.r}`));
        }
        document.getElementById('count-live').innerText = bugs.length;
        document.getElementById('count-born').innerText = totalBorn;
        document.getElementById('count-died').innerText = totalDied;
    }

    function drawHex(x, y, size, color, fill = true) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i + Math.PI / 6;
            ctx.lineTo(x + size * 0.98 * Math.cos(angle), y + size * 0.98 * Math.sin(angle));
        }
        ctx.closePath();
        if (fill) { ctx.fillStyle = color; ctx.fill(); }
        else { ctx.strokeStyle = color; ctx.lineWidth = 0.5; ctx.stroke(); }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        const size = 18 * scale;
        const w = Math.sqrt(3) * size;

        const startQ = Math.floor(((-offset.x - width) / w));
        const endQ = Math.ceil(((width - offset.x + width) / w));
        const startR = Math.floor(((-offset.y - height) / (size * 1.5)));
        const endR = Math.ceil(((height - offset.y + height) / (size * 1.5)));

        for (let r = startR; r <= endR; r++) {
            for (let q = startQ - 5; q <= endQ + 5; q++) {
                let key = `${q},${r}`;
                const x = offset.x + w * (q + r/2);
                const y = offset.y + size * 1.5 * r;
                if (x < -20 || x > width+20 || y < -20 || y > height+20) continue;

                if (walls.has(key)) drawHex(x, y, size, "#777");
                else if (trails.has(key)) drawHex(x, y, size, trails.get(key));
                else drawHex(x, y, size, "#ddd", false);
            }
        }

        arrows.forEach(a => {
            const x = offset.x + w * (a.q + a.r/2);
            const y = offset.y + size * 1.5 * a.r;
            if (x > 0 && x < width && y > 0 && y < height) {
                ctx.save(); ctx.translate(x, y); ctx.rotate((Math.PI/3) * a.dirIdx + Math.PI/6);
                ctx.strokeStyle = "rgba(0,0,255,0.1)"; ctx.beginPath(); ctx.moveTo(-size*0.2, 0); ctx.lineTo(size*0.2, 0); ctx.stroke(); ctx.restore();
            }
        });

        bugs.forEach(bug => {
            const x = offset.x + w * (bug.q + bug.r/2);
            const y = offset.y + size * 1.5 * bug.r;
            ctx.fillStyle = bugColors[bug.count] || "#4B0082";
            ctx.beginPath(); ctx.arc(x, y, size * 0.35, 0, Math.PI * 2); ctx.fill();
        });
        requestAnimationFrame(draw);
    }

    function pixelToHex(px, py) {
        const size = 18 * scale;
        const x = px - offset.x, y = py - offset.y;
        const q = (Math.sqrt(3)/3 * x - 1/3 * y) / size;
        const r = (2/3 * y) / size;
        let iq = Math.round(q), ir = Math.round(r), is = Math.round(-q-r);
        if (Math.abs(iq - q) > Math.abs(ir - r) && Math.abs(iq - q) > Math.abs(is - (-q-r))) iq = -ir-is;
        else if (Math.abs(ir - r) > Math.abs(is - (-q-r))) ir = -iq-is;
        return { q: iq, r: ir };
    }

    document.getElementById('generate-world').onclick = generateWorld;
    document.getElementById('time-controls').onclick = (e) => {
        if (e.target.tagName === 'BUTTON') {
            timeSpeed = parseInt(e.target.dataset.speed);
            document.querySelectorAll('#time-controls button').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
        }
    };

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoom = e.deltaY > 0 ? 0.9 : 1.1;
        offset.x = e.clientX - (e.clientX - offset.x) * zoom;
        offset.y = e.clientY - (e.clientY - offset.y) * zoom;
        scale *= zoom;
    }, { passive: false });

    canvas.addEventListener('mousedown', (e) => {
        const { q, r } = pixelToHex(e.clientX, e.clientY);
        if (currentMode === 'edit') {
            if (selectedObject === 'wall') walls.add(`${q},${r}`);
            else bugs.push(createBug(q, r));
        } else if (currentMode === 'delete') {
            walls.delete(`${q},${r}`); trails.delete(`${q},${r}`);
            bugs = bugs.filter(b => b.q !== q || b.r !== r);
        } else { isDragging = true; lastMousePos = { x: e.clientX, y: e.clientY }; }
    });

    window.addEventListener('mousemove', (e) => {
        if (isDragging && currentMode === 'move') {
            offset.x += e.clientX - lastMousePos.x;
            offset.y += e.clientY - lastMousePos.y;
            lastMousePos = { x: e.clientX, y: e.clientY };
        }
    });
    window.addEventListener('mouseup', () => isDragging = false);

    document.getElementById('mode-move').onclick = (e) => { currentMode = 'move'; updateActive(e.target); };
    document.getElementById('mode-edit').onclick = (e) => { currentMode = 'edit'; updateActive(e.target); };
    document.getElementById('mode-delete').onclick = (e) => { currentMode = 'delete'; updateActive(e.target); };
    document.getElementById('spawn-wall').onclick = (e) => { selectedObject = 'wall'; updateActive(e.target); };
    document.getElementById('spawn-bug').onclick = (e) => { selectedObject = 'bug'; updateActive(e.target); };
    document.getElementById('clear-all').onclick = () => { walls.clear(); trails.clear(); bugs = []; arrows = []; };
    function updateActive(el) { el.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active')); el.classList.add('active'); }

    setInterval(updateBugs, 100);
    window.addEventListener('resize', resize);
    resize(); draw();
</script>
</body>
</html>
